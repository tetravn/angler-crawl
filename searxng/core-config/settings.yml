# SearXNG cấu hình — bật JSON API + 80+ search engines
# Docs: https://docs.searxng.org/admin/settings/

use_default_settings: true

search:
  formats:
    - html
    - json

server:
  secret_key: "angler-local-dev-key-change-in-prod"
  bind_address: "0.0.0.0"
  # Cho phép CORS từ localhost để Hermes gọi API
  limiter: false

# Bật các engines phổ biến
engines:
  - name: duckduckgo
    disabled: false
  - name: google
    disabled: false
  - name: bing
    disabled: false
  - name: brave
    disabled: false
  - name: qwant
    disabled: false
